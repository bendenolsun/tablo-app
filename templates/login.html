<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — Dijital Operasyonlar Yönetimi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#0f0f0f;color:#f0ede8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:14px;padding:40px 32px;width:100%;max-width:380px}
  h1{font-size:20px;font-weight:700;margin-bottom:4px;color:#d4a843}
  .sub{font-size:13px;color:#666;margin-bottom:28px}
  label{display:block;font-size:12px;font-weight:600;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  input{width:100%;background:#242424;border:1px solid #2e2e2e;border-radius:8px;padding:10px 14px;color:#f0ede8;font-size:14px;font-family:inherit;outline:none;transition:border .15s;margin-bottom:16px}
  input:focus{border-color:#d4a843}
  .btn{width:100%;padding:11px;background:#d4a843;color:#0f0f0f;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-family:inherit}
  .btn:hover{background:#e8bb55}
  .err{background:#2a0a0a;border:1px solid #4a1a1a;color:#f87171;padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <h1>📦 Dijital Operasyonlar Yönetimi</h1>
  <div class="sub">Panele erişmek için şifrenizi girin.</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post">
    <label>Şifre</label>
    <input type="password" name="password" autofocus placeholder="••••••••">
    <button class="btn">Giriş Yap</button>
  </form>
</div>
</body>
</html>
