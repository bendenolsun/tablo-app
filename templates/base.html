<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Tablo Sipariş{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #706abc;
    --accent-dim: #5a559e;
    --text: #f0ede8;
    --text-muted: #888;
    --text-dim: #555;
    --success: #4ade80;
    --error: #f87171;
    --warning: #fbbf24;
    --radius: 10px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-dim); }

  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    font-weight: 700;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .nav-links { display: flex; gap: 4px; align-items: center; }
  .nav-link {
    padding: 6px 14px;
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .nav-link:hover, .nav-link.active { background: var(--surface2); color: var(--text); }

  .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .page-sm { max-width: 560px; margin: 0 auto; padding: 40px 24px; }

  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .page-header p { color: var(--text-muted); margin-top: 4px; font-size: 13px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #ffffff; }
  .btn-primary:hover { background: #8580cc; color: #ffffff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--error); border: 1px solid #3a1a1a; }
  .btn-danger:hover { background: #2a1010; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-ghost { background: transparent; color: var(--text-muted); }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }

  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 13px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    transition: border 0.15s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--surface2); }
  .form-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .badge-success { background: #0d2e1a; color: var(--success); }
  .badge-pending { background: #2a2000; color: var(--warning); }
  .badge-error { background: #2a0a0a; color: var(--error); }

  .table { width: 100%; border-collapse: collapse; }
  .table th {
    text-align: left; padding: 10px 14px;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--surface2); }

  .alert { padding: 12px 16px; border-radius: 7px; font-size: 13px; margin-bottom: 16px; }
  .alert-error { background: #2a0a0a; border: 1px solid #4a1a1a; color: var(--error); }
  .alert-success { background: #0a2a14; border: 1px solid #1a4a2a; color: var(--success); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .stat-card .stat-val { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
  .stat-card .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  @media (max-width: 640px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .page { padding: 20px 16px; }
  }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% block nav %}
<nav class="nav">
  <span class="nav-brand">📦 Dijital Operasyonlar Yönetimi</span>
  <div class="nav-links">
    <a href="/admin" class="nav-link {% if active=='panel' %}active{% endif %}">Panel</a>
    <a href="/admin/orders" class="nav-link {% if active=='orders' %}active{% endif %}">Siparişler</a>
    <a href="/admin/templates/new" class="nav-link {% if active=='new_tmpl' %}active{% endif %}">+ Şablon</a>
    <a href="/admin/logout" class="nav-link">Çıkış</a>
  </div>
</nav>
{% endblock %}
{% block content %}{% endblock %}
<script>
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.textContent = '✓ Kopyalandı';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = 'Kopyala';
    }, 2000);
  });
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
